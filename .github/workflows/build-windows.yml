# Builds EnvelopeStudio for Windows (EXE + _internal). Run from GitHub Actions if you are on Mac/Linux.
name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  pyinstaller:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: PyInstaller
        run: |
          if (Test-Path dist\EnvelopeStudio) { Remove-Item -Recurse -Force dist\EnvelopeStudio }
          if (Test-Path build\envelope-studio) { Remove-Item -Recurse -Force build\envelope-studio }
          pyinstaller -y envelope-studio.spec

      - name: Upload EnvelopeStudio folder (ZIP artifact)
        uses: actions/upload-artifact@v4
        with:
          name: EnvelopeStudio-Windows-x64
          path: dist/EnvelopeStudio
